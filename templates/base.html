<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Sentiment App{% endblock %}</title>

  <!-- Favicon -->
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon" />

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

  <!-- 💡 NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('index') }}">SentimentAI</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link {% if request.path == url_for('index') %}active{% endif %}" href="{{ url_for('index') }}">Home</a></li>
          <li class="nav-item"><a class="nav-link {% if request.path == url_for('performance') %}active{% endif %}" href="{{ url_for('performance') }}">Performance</a></li>
          <li class="nav-item"><a class="nav-link {% if request.path == url_for('wordcloud') %}active{% endif %}" href="{{ url_for('wordcloud') }}">Word Clouds</a></li>
          <li class="nav-item"><a class="nav-link {% if request.path == url_for('about') %}active{% endif %}" href="{{ url_for('about') }}">About</a></li>
          <li class="nav-item"><a class="nav-link {% if request.path == url_for('contact') %}active{% endif %}" href="{{ url_for('contact') }}">Contact</a></li>
        </ul>

        <!-- 🌙 Dark Mode Toggle Switch -->
        <div class="form-check form-switch text-light d-flex align-items-center">
          <input class="form-check-input" type="checkbox" id="darkModeToggle" />
          <label class="form-check-label ms-2" for="darkModeToggle" id="darkModeLabel">🌞 Light</label>
        </div>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="container" style="margin-top:70px;">
    {% block content %}{% endblock %}
  </div>

  <!-- FOOTER -->
  <footer class="footer mt-auto py-3 bg-light">
    <div class="container text-center">
      <span class="text-muted">© 2025 SentimentAI – Made with ❤️ for MCA Project</span>
    </div>
  </footer>

  <!-- Bootstrap Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- ✅ JavaScript for Spinner and Dark Mode -->
  <script>
    // Show spinner during form submission
    const form = document.querySelector("form");
    const button = document.querySelector("#analyzeBtn");
    const spinner = document.querySelector("#loadingSpinner");

    if (form && button && spinner) {
      form.addEventListener("submit", () => {
        spinner.classList.remove("d-none");
        button.disabled = true;
      });
    }

    // 🌙 Dark Mode Toggle
    const toggleInput = document.getElementById('darkModeToggle');
    const toggleLabel = document.getElementById('darkModeLabel');

    // On page load, apply theme
    if (localStorage.getItem("theme") === "dark") {
      document.body.classList.add("dark-mode");
      if (toggleInput) toggleInput.checked = true;
      if (toggleLabel) toggleLabel.textContent = "🌙 Dark";
    }

    // On switch click
    if (toggleInput) {
      toggleInput.addEventListener("change", () => {
        document.body.classList.toggle("dark-mode");
        if (document.body.classList.contains("dark-mode")) {
          localStorage.setItem("theme", "dark");
          toggleLabel.textContent = "🌙 Dark";
        } else {
          localStorage.setItem("theme", "light");
          toggleLabel.textContent = "🌞 Light";
        }
      });
    }
  </script>

</body>
</html>
